<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="icon" href="assets/img/tab-img.png" type="image/png">
  <style>
    /* Additional admin-specific styles */
    .admin__uploader {
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .admin__uploader:hover {
      border-color: var(--first-color);
      background-color: var(--first-color-alt);
    }
    .admin__uploader.dragover {
      border-color: var(--first-color);
      background-color: var(--first-color-alt);
    }
  </style>
</head>
<body>
  <!-- Centered logo -->
  <header class="admin__header">
    <a href="index.html" class="admin__logo" aria-label="Home">
      <img src="assets/img/logo.svg" alt="Logo">
    </a>
  </header>

  <main class="admin__wrap">
    <section class="admin__card">
      <h2 class="section__title admin__title">Add New Product</h2>

      <form id="product-form" class="admin__form" enctype="multipart/form-data">
        <div class="form__group">
          <label class="form__label">Title</label>
          <input name="title" class="form__input" type="text" placeholder="Product title" required />
        </div>

        <div class="form__group">
          <label class="form__label">Price</label>
          <input name="price" class="form__input" type="number" step="0.01" min="0" placeholder="0.00" required />

          <!-- NEW: target categories under Price -->
          <div class="targets__wrap">
            <span class="form__label">Target Sections</span>
            <div class="targets__row">
              <label><input type="checkbox" name="targets" value="featured"> featured</label>
              <label><input type="checkbox" name="targets" value="popular"> popular</label>
              <label><input type="checkbox" name="targets" value="new-added"> new-added</label>
              <label><input type="checkbox" name="targets" value="new-arrivals"> new-arrivals</label>
            </div>
          </div>

          <!-- Optional product badge (shows on card) -->
          <div class="form__group" style="margin-top:.5rem;">
            <label class="form__label">Badge (optional)</label>
            <input name="badge" class="form__input" type="text" placeholder="e.g. New, Hot, -20%" />
          </div>
        </div>

        <div class="form__group">
          <label class="form__label">Category</label>
          <input name="category" class="form__input" type="text" placeholder="e.g. Shoes, Bags" />
        </div>

        <div class="form__group form__group--full">
          <label class="form__label">Description</label>
          <textarea name="description" class="form__textarea" rows="3" placeholder="Short description"></textarea>
        </div>

        <div class="form__group form__group--full">
          <label class="form__label">Image</label>
          <div class="admin__uploader" id="uploader">
            <div class="admin__uploader-thumb">
              <img id="thumbImg" alt="Preview" style="display:none; max-width: 100%; max-height: 100%;">
              <span id="thumbPlaceholder">No image selected</span>
            </div>
            <input id="imageInput" name="image" type="file" accept="image/*" style="display:none;" />
            <small>Drag & drop an image here, or click to choose</small>
          </div>
        </div>

        <div class="admin__actions form__group--full">
          <button type="submit" class="btn btn--md">
            <i class="fi-br-plus"></i> Publish Product
          </button>
        </div>
      </form>
    </section>

    <section class="admin__list">
      <h2 class="section__title admin__subtitle">Latest Products</h2>
      <div id="admin-products" class="admin__grid"></div>
    </section>
  </main>

  <div id="admin-toast" class="notification" style="opacity:0; position: fixed; top: 20px; right: 20px; padding: 15px 20px; border-radius: 4px; color: white; z-index: 10000; transition: opacity 0.3s;"></div>

  <!-- Inline JavaScript - This will definitely work -->
  <script>
    // Simple and reliable file upload functionality
    document.addEventListener('DOMContentLoaded', function() {
      console.log('Admin page loaded successfully');
      
      const fileInput = document.getElementById('imageInput');
      const uploader = document.getElementById('uploader');
      const thumbImg = document.getElementById('thumbImg');
      const thumbPh = document.getElementById('thumbPlaceholder');
      const form = document.getElementById('product-form');

      // Debug log
      console.log('Found elements:', { fileInput, uploader, thumbImg, thumbPh, form });

      // 1. FILE UPLOAD FUNCTIONALITY
      if (uploader && fileInput) {
        console.log('Initializing file upload...');
        
        // Make uploader clearly clickable
        uploader.style.cursor = 'pointer';
        uploader.title = 'Click to select an image';
        
        // Click handler
        uploader.addEventListener('click', function(e) {
          console.log('Uploader clicked!');
          e.preventDefault();
          e.stopPropagation();
          fileInput.click();
        });

        // File selection handler
        fileInput.addEventListener('change', function(e) {
          console.log('File selected:', e.target.files[0]);
          if (e.target.files && e.target.files[0]) {
            const file = e.target.files[0];
            const reader = new FileReader();
            
            reader.onload = function(e) {
              console.log('File loaded successfully');
              if (thumbImg) {
                thumbImg.src = e.target.result;
                thumbImg.style.display = 'block';
              }
              if (thumbPh) {
                thumbPh.style.display = 'none';
              }
            };
            
            reader.onerror = function() {
              console.error('Error reading file');
              alert('Error reading the selected file. Please try another image.');
            };
            
            reader.readAsDataURL(file);
          }
        });

        // Drag and drop functionality
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
          uploader.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
          e.preventDefault();
          e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
          uploader.addEventListener(eventName, function() {
            uploader.classList.add('dragover');
          }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
          uploader.addEventListener(eventName, function() {
            uploader.classList.remove('dragover');
          }, false);
        });

        uploader.addEventListener('drop', function(e) {
          console.log('File dropped');
          const files = e.dataTransfer.files;
          if (files && files[0]) {
            fileInput.files = files;
            // Trigger change event
            const event = new Event('change');
            fileInput.dispatchEvent(event);
          }
        });

        console.log('File upload initialized successfully');
      } else {
        console.error('Uploader or fileInput not found!');
      }

      // 2. TOAST FUNCTIONALITY
      window.showToast = function(message, type = 'success') {
        const toast = document.getElementById('admin-toast');
        if (toast) {
          toast.textContent = message;
          toast.className = 'notification ' + type;
          toast.style.opacity = '1';
          setTimeout(() => {
            toast.style.opacity = '0';
          }, 3000);
        }
      };

      // 3. FORM SUBMISSION
      if (form) {
        form.addEventListener('submit', async function(e) {
          e.preventDefault();
          console.log('Form submitted');
          
          const submitBtn = form.querySelector('button[type="submit"]');
          const originalText = submitBtn.innerHTML;
          
          try {
            // Show loading state
            submitBtn.innerHTML = 'Publishing...';
            submitBtn.disabled = true;
            
            const formData = new FormData(form);
            
            // Log form data for debugging
            console.log('Form data:');
            for (let [key, value] of formData.entries()) {
              console.log(key + ': ' + value);
            }
            
            // Simulate API call - replace with your actual API endpoint
            // const response = await fetch('/api/products', {
            //   method: 'POST',
            //   body: formData
            // });
            
            // For now, just show success message
            setTimeout(() => {
              showToast('Product published successfully! (Demo)');
              
              // Reset form
              form.reset();
              if (thumbImg) thumbImg.style.display = 'none';
              if (thumbPh) thumbPh.style.display = 'block';
              
              // Reset button
              submitBtn.innerHTML = originalText;
              submitBtn.disabled = false;
              
              // Add demo product to list
              addDemoProduct();
            }, 1000);
            
          } catch (error) {
            console.error('Form submission error:', error);
            showToast('Error: ' + error.message, 'error');
            submitBtn.innerHTML = originalText;
            submitBtn.disabled = false;
          }
        });
      }

      // 4. DEMO PRODUCT FUNCTIONALITY
      function addDemoProduct() {
        const title = document.querySelector('input[name="title"]').value || 'Demo Product';
        const price = document.querySelector('input[name="price"]').value || '29.99';
        const category = document.querySelector('input[name="category"]').value || 'Demo Category';
        const badge = document.querySelector('input[name="badge"]').value || '';
        
        const productGrid = document.getElementById('admin-products');
        if (productGrid) {
          const productHTML = `
            <div class="product__item">
              <div class="product__images">
                <img src="assets/img/product-1-1.jpg" alt="${title}" />
                ${badge ? `<span class="product__badge">${badge}</span>` : ''}
              </div>
              <div class="product__content">
                <span class="product__category">${category}</span>
                <h3 class="product__title">${title}</h3>
                <div class="product__price">
                  <span class="new__price">$${parseFloat(price).toFixed(2)}</span>
                </div>
              </div>
            </div>
          `;
          
          productGrid.insertAdjacentHTML('afterbegin', productHTML);
        }
      }

      // 5. LOAD EXISTING PRODUCTS (DEMO)
      function loadDemoProducts() {
        const productGrid = document.getElementById('admin-products');
        if (productGrid) {
          productGrid.innerHTML = `
            <div class="product__item">
              <div class="product__images">
                <img src="assets/img/product-1-1.jpg" alt="Sample Product" />
                <span class="product__badge">New</span>
              </div>
              <div class="product__content">
                <span class="product__category">Electronics</span>
                <h3 class="product__title">Sample Product</h3>
                <div class="product__price">
                  <span class="new__price">$99.99</span>
                </div>
              </div>
            </div>
          `;
        }
      }

      // Load demo products on page load
      loadDemoProducts();

      console.log('All admin functionality initialized successfully');
    });

    // Fallback in case DOMContentLoaded doesn't fire
    setTimeout(function() {
      if (!document.getElementById('uploader').hasAttribute('data-initialized')) {
        console.log('Using fallback initialization');
        document.getElementById('uploader').addEventListener('click', function() {
          document.getElementById('imageInput').click();
        });
        document.getElementById('uploader').setAttribute('data-initialized', 'true');
      }
    }, 1000);
  </script>
</body>
</html>
