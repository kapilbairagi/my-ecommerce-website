<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--=============== FLATICON ===============-->
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/3.0.0/uicons-bold-rounded/css/uicons-bold-rounded.css">
    <!--=============== CSS ===============-->
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link rel="icon" href="assets/img/tab-img.png" type="image/png">
    <title>Forgot Password</title>
  </head>
  <body>
    <!--=============== FORGOT PASSWORD ===============-->
    <section class="login-register section--lg">
      <div class="login-register__container container">
        
        <!-- Logo -->
        <a href="index.html">
          <img src="assets/img/logo.svg" alt="Logo" />
        </a>

        <!-- Form -->
        <div class="login">
          <h3 class="section__title">Forgot Password</h3>
          <p class="form__description">
            Enter your email address and we’ll send you a link to reset your password.
          </p>

          <form action="" class="form grid">
            <div class="input-box">
              <input type="email" placeholder="Enter your email" class="form__input" required>
              <i class="fi fi-br-envelope"></i>
            </div>

            <div class="form__btn">
              <button type="submit" class="btn btn--full">Send Reset Link</button>
            </div>

            <div class="register__bottom">
              <p>Remembered your password? <a href="login.html">Login</a></p>
            </div>
          </form>
        </div>
      </div>
    </section>

    <!--=============== SWIPER JS ===============-->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <!--=============== MAIN JS ===============-->
    <script src="assets/js/main.js"></script>
  </body>
</html>
